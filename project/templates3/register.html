<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>FindMyTeam – Registracija</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style3.css') }}">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="logo">
                <span class="logo-icon">🎮</span>
                <h1>FindMyTeam</h1>
                <p class="tagline">Ustvari račun</p>
            </div>

            {% if error %}
                <div class="alert alert-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/register">
                <div class="form-group">
                    <label for="username">Uporabniško ime</label>
                    <input type="text" id="username" name="username" placeholder="Izberi ime..." required>
                </div>
                <div class="form-group">
                    <label for="password">Geslo</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label for="game">Priljubljena igra</label>
                    <input type="text" id="game" name="game" placeholder="npr. Valorant, CS2, LoL...">
                </div>
                <button type="submit" class="btn btn-primary btn-full">Registriraj se</button>
            </form>

            <p class="auth-link">Že imaš račun? <a href="/login">Prijava</a></p>
        </div>
    </div>
</body>
</html>
